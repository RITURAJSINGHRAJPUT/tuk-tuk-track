<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Inbox - Admin</title>
    <link href="./css/style.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>

<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 font-sans transition-colors duration-200">

    <div class="flex h-screen overflow-hidden relative">
        <!-- Sidebar Backdrop -->
        <div id="sidebar-backdrop"
            class="fixed inset-0 bg-black/50 z-[55] hidden md:hidden backdrop-blur-sm transition-opacity"></div>

        <!-- Admin Sidebar -->
        <aside id="sidebar"
            class="w-72 bg-white md:bg-white/80 dark:bg-gray-900 md:dark:bg-gray-900/90 backdrop-blur-xl border-r border-gray-200 dark:border-gray-800 hidden md:flex flex-col z-50 transition-all duration-300">
            <div class="p-6 flex items-center justify-between gap-3 mb-2">
                <div class="flex items-center gap-3">
                    <div
                        class="w-10 h-10 bg-gradient-to-tr from-purple-600 to-purple-400 rounded-xl flex items-center justify-center shadow-lg shadow-purple-500/20">
                        <i data-lucide="truck" class="text-white w-6 h-6"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold tracking-tight text-gray-900 dark:text-white leading-none">TukTuk
                        </h1>
                        <span class="text-xs font-bold text-purple-500 tracking-widest uppercase">Admin</span>
                    </div>
                </div>
                <button id="sidebar-close-btn"
                    class="md:hidden p-2 text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            <nav class="flex-1 px-4 space-y-2">
                <p class="px-4 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2 mt-4">Overview</p>

                <a href="admindashboard.html"
                    class="flex items-center gap-3 px-4 py-3.5 text-gray-600 dark:text-gray-400 hover:bg-white dark:hover:bg-gray-800 hover:shadow-md hover:shadow-gray-200/50 dark:hover:shadow-black/20 rounded-xl transition-all group">
                    <i data-lucide="layout-dashboard" class="w-5 h-5 group-hover:text-purple-500 transition-colors"></i>
                    <span
                        class="font-medium group-hover:text-gray-900 dark:group-hover:text-white transition-colors">Dashboard</span>
                </a>

                <p class="px-4 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2 mt-6">Management</p>

                <a href="admin-shipments.html"
                    class="flex items-center gap-3 px-4 py-3.5 text-gray-600 dark:text-gray-400 hover:bg-white dark:hover:bg-gray-800 hover:shadow-md hover:shadow-gray-200/50 dark:hover:shadow-black/20 rounded-xl transition-all group">
                    <i data-lucide="truck" class="w-5 h-5 group-hover:text-purple-500 transition-colors"></i>
                    <span
                        class="font-medium group-hover:text-gray-900 dark:group-hover:text-white transition-colors">Shipments</span>
                </a>

                <a href="admin-users.html"
                    class="flex items-center gap-3 px-4 py-3.5 text-gray-600 dark:text-gray-400 hover:bg-white dark:hover:bg-gray-800 hover:shadow-md hover:shadow-gray-200/50 dark:hover:shadow-black/20 rounded-xl transition-all group">
                    <i data-lucide="user-circle" class="w-5 h-5 group-hover:text-purple-500 transition-colors"></i>
                    <span
                        class="font-medium group-hover:text-gray-900 dark:group-hover:text-white transition-colors">Users</span>
                </a>

                <a href="admin-drivers.html"
                    class="flex items-center gap-3 px-4 py-3.5 text-gray-600 dark:text-gray-400 hover:bg-white dark:hover:bg-gray-800 hover:shadow-md hover:shadow-gray-200/50 dark:hover:shadow-black/20 rounded-xl transition-all group">
                    <i data-lucide="id-card" class="w-5 h-5 group-hover:text-purple-500 transition-colors"></i>
                    <span
                        class="font-medium group-hover:text-gray-900 dark:group-hover:text-white transition-colors">Drivers</span>
                </a>

                <p class="px-4 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2 mt-6">System</p>

                <a href="admin-tracking.html"
                    class="flex items-center gap-3 px-4 py-3.5 text-gray-600 dark:text-gray-400 hover:bg-white dark:hover:bg-gray-800 hover:shadow-md hover:shadow-gray-200/50 dark:hover:shadow-black/20 rounded-xl transition-all group">
                    <i data-lucide="map" class="w-5 h-5 group-hover:text-purple-500 transition-colors"></i>
                    <span
                        class="font-medium group-hover:text-gray-900 dark:group-hover:text-white transition-colors">Live
                        Tracking</span>
                </a>

                <a href="admin-update-tracking.html"
                    class="flex items-center gap-3 px-4 py-3.5 text-gray-600 dark:text-gray-400 hover:bg-white dark:hover:bg-gray-800 hover:shadow-md hover:shadow-gray-200/50 dark:hover:shadow-black/20 rounded-xl transition-all group">
                    <i data-lucide="navigation" class="w-5 h-5 group-hover:text-purple-500 transition-colors"></i>
                    <span
                        class="font-medium group-hover:text-gray-900 dark:group-hover:text-white transition-colors">Update
                        Tracking</span>
                </a>

                <a href="admin-assign-device.html"
                    class="flex items-center gap-3 px-4 py-3.5 text-gray-600 dark:text-gray-400 hover:bg-white dark:hover:bg-gray-800 hover:shadow-md hover:shadow-gray-200/50 dark:hover:shadow-black/20 rounded-xl transition-all group">
                    <i data-lucide="link" class="w-5 h-5 group-hover:text-purple-500 transition-colors"></i>
                    <span
                        class="font-medium group-hover:text-gray-900 dark:group-hover:text-white transition-colors">Assign
                        Device</span>
                </a>

                <a href="contact-service-admin.html"
                    class="flex items-center gap-3 px-4 py-3.5 bg-gradient-to-r from-purple-600 to-purple-500 text-white rounded-xl shadow-lg shadow-purple-500/20 transition-all group">
                    <i data-lucide="inbox" class="w-5 h-5"></i>
                    <span class="font-medium">Support Inbox</span>
                </a>
            </nav>
            <div id="user-profile-section" class="p-4 border-t border-gray-200 dark:border-gray-800 mt-auto">
                <!-- Injected via JS -->
            </div>
        </aside>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col overflow-hidden relative">
            <header
                class="h-16 md:h-20 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-800 flex items-center justify-between px-4 md:px-8 z-40">
                <div class="flex items-center gap-4">
                    <button id="sidebar-toggle"
                        class="md:hidden p-2 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors">
                        <i data-lucide="menu" class="w-6 h-6"></i>
                    </button>
                    <div>
                        <h1 class="text-xl md:text-2xl font-bold text-gray-900 dark:text-white">Support Inbox</h1>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <button id="theme-toggle"
                        class="p-2.5 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-xl transition-colors border border-transparent hover:border-gray-200 dark:hover:border-gray-700">
                        <i data-lucide="sun" class="w-5 h-5 dark:hidden"></i>
                        <i data-lucide="moon" class="w-5 h-5 hidden dark:block"></i>
                    </button>
                    <button id="logout-btn"
                        class="p-2.5 text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-xl transition-colors"
                        title="Logout">
                        <i data-lucide="log-out" class="w-5 h-5"></i>
                    </button>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-4 md:p-8">
                <div class="max-w-4xl mx-auto space-y-8">
                    <!-- Contacts Grid (Admin specific) -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="contacts-grid">
                        <div
                            class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700">
                            <div
                                class="w-12 h-12 text-purple-600 bg-purple-100 dark:bg-purple-900/30 rounded-2xl flex items-center justify-center mb-4">
                                <i data-lucide="server" class="w-6 h-6"></i>
                            </div>
                            <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-2">System Admin</h3>
                            <div class="space-y-2">
                                <a href="tel:+15550001111"
                                    class="flex items-center gap-2 text-gray-600 dark:text-gray-400 hover:text-purple-600">
                                    <i data-lucide="phone" class="w-4 h-4"></i> +1 (555) 000-1111
                                </a>
                                <a href="mailto:sysadmin@tuktuk.com"
                                    class="flex items-center gap-2 text-gray-600 dark:text-gray-400 hover:text-purple-600">
                                    <i data-lucide="mail" class="w-4 h-4"></i> sys@tuktuk.com
                                </a>
                            </div>
                        </div>
                    </div>

                    <!-- Filter Bar -->
                    <div class="flex items-center gap-2 overflow-x-auto pb-2">
                        <button
                            class="px-4 py-2 bg-purple-600 text-white rounded-lg text-sm font-bold whitespace-nowrap">All
                            Tickets</button>
                        <button
                            class="px-4 py-2 bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-700 border border-gray-200 dark:border-gray-700 rounded-lg text-sm font-bold whitespace-nowrap">Open</button>
                        <button
                            class="px-4 py-2 bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-700 border border-gray-200 dark:border-gray-700 rounded-lg text-sm font-bold whitespace-nowrap">Resolved</button>
                    </div>

                    <!-- Tickets Inbox -->
                    <div id="tickets-section"
                        class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 p-6 md:p-8">
                        <h2 class="text-xl font-bold text-gray-900 dark:text-white flex items-center gap-2 mb-6">
                            <i data-lucide="inbox" class="w-5 h-5 text-purple-500"></i>
                            <span>Incoming Tickets</span>
                        </h2>
                        <div id="tickets-list" class="space-y-4">
                            <p class="text-center text-gray-500 py-4">Loading inbox...</p>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast"
        class="fixed bottom-4 right-4 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 shadow-xl rounded-xl p-4 flex items-center gap-3 transform translate-y-24 transition-all duration-300 z-[100]">
        <div id="toast-icon" class="w-8 h-8 rounded-full bg-green-100 text-green-600 flex items-center justify-center">
            <i data-lucide="check" class="w-4 h-4"></i>
        </div>
        <div>
            <h4 id="toast-title" class="text-sm font-bold text-gray-900 dark:text-white">Success</h4>
            <p id="toast-message" class="text-xs text-gray-500 dark:text-gray-400">Action completed successfully.</p>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script type="module" src="js/contact-service-admin.js"></script>
</body>

</html>
