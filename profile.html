<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - TukTukTrack</title>
    <link href="./css/style.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>

<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 font-sans transition-colors duration-200">

    <div class="flex h-screen overflow-hidden relative">
        <!-- Sidebar Backdrop (Mobile) -->
        <div id="sidebar-backdrop"
            class="fixed inset-0 bg-black/50 z-[55] hidden md:hidden backdrop-blur-sm transition-opacity"></div>

        <!-- Sidebar -->
        <aside id="sidebar"
            class="md:w-72 bg-white md:bg-white/80 dark:bg-gray-900 md:dark:bg-gray-900/90 backdrop-blur-xl border-r border-gray-200 dark:border-gray-800 hidden md:flex flex-col z-50 transition-all duration-300">
            <div class="p-6 flex items-center justify-between gap-3 mb-2">
                <div class="flex items-center gap-3">
                    <div
                        class="w-10 h-10 bg-gradient-to-tr from-blue-600 to-blue-400 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                        <i data-lucide="truck" class="text-white w-6 h-6"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold tracking-tight text-gray-900 dark:text-white leading-none">TukTuk
                        </h1>
                        <span class="text-xs font-bold text-blue-500 tracking-widest uppercase">Track</span>
                    </div>
                </div>
                <button id="sidebar-close"
                    class="md:hidden p-2 text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>

            <nav class="flex-1 px-4 space-y-2">
                <p class="px-4 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2 mt-4">Menu</p>

                <a href="dashboard.html"
                    class="flex items-center gap-3 px-4 py-3.5 text-gray-600 dark:text-gray-400 hover:bg-white dark:hover:bg-gray-800 hover:shadow-md hover:shadow-gray-200/50 dark:hover:shadow-black/20 rounded-xl transition-all group">
                    <i data-lucide="layout-dashboard" class="w-5 h-5 group-hover:text-blue-500 transition-colors"></i>
                    <span
                        class="font-medium group-hover:text-gray-900 dark:group-hover:text-white transition-colors">Dashboard</span>
                </a>

                <a href="track.html"
                    class="flex items-center gap-3 px-4 py-3.5 text-gray-600 dark:text-gray-400 hover:bg-white dark:hover:bg-gray-800 hover:shadow-md hover:shadow-gray-200/50 dark:hover:shadow-black/20 rounded-xl transition-all group">
                    <i data-lucide="map" class="w-5 h-5 group-hover:text-blue-500 transition-colors"></i>
                    <span
                        class="font-medium group-hover:text-gray-900 dark:group-hover:text-white transition-colors">Tracking</span>
                </a>

                <a href="request.html"
                    class="flex items-center gap-3 px-4 py-3.5 text-gray-600 dark:text-gray-400 hover:bg-white dark:hover:bg-gray-800 hover:shadow-md hover:shadow-gray-200/50 dark:hover:shadow-black/20 rounded-xl transition-all group">
                    <i data-lucide="package-plus" class="w-5 h-5 group-hover:text-blue-500 transition-colors"></i>
                    <span
                        class="font-medium group-hover:text-gray-900 dark:group-hover:text-white transition-colors">Request
                        Shipment</span>
                </a>
            </nav>

            <div class="p-4 border-t border-gray-200 dark:border-gray-800">
                <a href="profile.html"
                    class="flex items-center gap-3 p-3 rounded-xl bg-blue-50 dark:bg-blue-900/10 border border-blue-100 dark:border-blue-900/50 transition-colors group cursor-pointer hover:bg-blue-100 dark:hover:bg-blue-900/30">
                    <img src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/People/Man%20Technologist.png"
                        alt="User"
                        class="w-10 h-10 rounded-full ring-2 ring-white dark:ring-gray-800 sidebar-user-img bg-white/10 p-0.5">
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-bold text-gray-900 dark:text-white truncate sidebar-user-name">User
                        </p>
                        <p class="text-xs text-gray-500 truncate sidebar-user-role">user@example.com</p>
                    </div>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col h-screen overflow-hidden relative">
            <!-- Header -->
            <header
                class="h-16 md:h-20 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-800 flex items-center justify-between px-4 md:px-8 z-40">
                <div class="flex items-center gap-4">
                    <button id="sidebar-toggle"
                        class="md:hidden p-2 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors">
                        <i data-lucide="menu" class="w-6 h-6"></i>
                    </button>
                    <div>
                        <h1 class="text-xl md:text-2xl font-bold text-gray-900 dark:text-white">Account Settings</h1>
                        <p class="text-xs md:text-sm text-gray-500 dark:text-gray-400 hidden sm:block">Manage your
                            profile and preferences</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <button id="theme-toggle"
                        class="p-2.5 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-xl transition-colors border border-transparent hover:border-gray-200 dark:hover:border-gray-700">
                        <i data-lucide="sun" class="w-5 h-5 dark:hidden"></i>
                        <i data-lucide="moon" class="w-5 h-5 hidden dark:block"></i>
                    </button>
                    <button id="logout-btn"
                        class="p-2.5 text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-xl transition-colors"
                        title="Logout">
                        <i data-lucide="log-out" class="w-5 h-5"></i>
                    </button>
                </div>
            </header>

            <!-- Scrollable Content -->
            <main class="flex-1 overflow-y-auto bg-gray-50 dark:bg-gray-900 p-4 sm:p-6 lg:p-8">
                <div class="max-w-4xl mx-auto space-y-6">

                    <!-- Profile Banner / Header -->
                    <div
                        class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden">
                        <div class="h-48 relative overflow-hidden group">
                            <!-- Dynamic Background Image -->
                            <img id="banner-bg" src="https://picsum.photos/800/400"
                                class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-105"
                                alt="Profile Cover">

                            <!-- Dark Gradient Overlay for Text Readability -->
                            <div class="absolute inset-0 bg-gradient-to-r from-black/60 via-blue-900/40 to-black/60">
                            </div>

                            <!-- Random Quote Container -->
                            <div class="relative h-full flex items-center justify-center p-6 text-center">
                                <div>
                                    <p id="banner-quote"
                                        class="text-white text-lg md:text-xl font-medium italic opacity-90 drop-shadow-md font-serif max-w-2xl mx-auto">
                                        "Loading inspiration..."
                                    </p>
                                    <p id="quote-author"
                                        class="text-white/80 text-xs mt-2 font-sans uppercase tracking-widest hidden">
                                        - Unknown
                                    </p>
                                </div>
                            </div>
                        </div>
                        <div class="px-6 pb-6 relative">
                            <div class="flex flex-col sm:flex-row items-center sm:items-end -mt-12 mb-4 gap-4">
                                <img id="profile-img-large"
                                    src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/People/Man%20Technologist.png"
                                    class="w-24 h-24 rounded-full ring-4 ring-white dark:ring-gray-800 bg-white shadow-md object-contain p-1">
                                <div class="text-center sm:text-left flex-1">
                                    <h1 id="profile-name-large"
                                        class="text-2xl font-bold text-gray-900 dark:text-white leading-tight">
                                        Loading...</h1>
                                    <p id="profile-email-large" class="text-gray-500 dark:text-gray-400">...</p>
                                </div>
                                <button onclick="toggleEditMode()"
                                    class="px-4 py-2 bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg shadow-sm hover:bg-gray-50 dark:hover:bg-gray-600 transition-colors text-sm font-medium text-gray-700 dark:text-gray-200">
                                    Edit Profile
                                </button>
                            </div>

                            <!-- Quick Stats -->
                            <div
                                class="grid grid-cols-2 sm:grid-cols-4 gap-4 pt-4 border-t border-gray-100 dark:border-gray-700">
                                <div class="text-center sm:text-left">
                                    <span class="text-xs text-gray-500 uppercase font-semibold">Total Orders</span>
                                    <p id="stat-total-orders" class="text-xl font-bold text-gray-900 dark:text-white">0
                                    </p>
                                </div>
                                <div class="text-center sm:text-left">
                                    <span class="text-xs text-gray-500 uppercase font-semibold">Active</span>
                                    <p id="stat-active-orders" class="text-xl font-bold text-blue-600">0</p>
                                </div>
                                <div class="text-center sm:text-left">
                                    <span class="text-xs text-gray-500 uppercase font-semibold">Joined</span>
                                    <p id="stat-joined-date" class="text-gray-900 dark:text-white font-medium">Unknown
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Personal Information Form -->
                    <div
                        class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 p-6">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-lg font-bold text-gray-900 dark:text-white">Personal Information</h3>
                            <span id="form-status" class="text-xs text-green-500 font-medium hidden">Changes
                                Saved!</span>
                        </div>

                        <form id="profile-form" onsubmit="saveProfile(event)"
                            class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label class="text-sm font-medium text-gray-700 dark:text-gray-300">Full Name</label>
                                <div class="relative">
                                    <input type="text" id="input-name" disabled
                                        class="w-full pl-10 pr-4 py-2.5 bg-gray-50 dark:bg-gray-900/50 border border-gray-200 dark:border-gray-700 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 disabled:opacity-60 disabled:cursor-not-allowed transition-all">
                                    <i data-lucide="user"
                                        class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                                </div>
                            </div>

                            <div class="space-y-2">
                                <label class="text-sm font-medium text-gray-700 dark:text-gray-300">Email
                                    Address</label>
                                <div class="relative">
                                    <input type="email" id="input-email" disabled
                                        class="w-full pl-10 pr-4 py-2.5 bg-gray-100 dark:bg-gray-800 border-none rounded-xl text-gray-500 cursor-not-allowed">
                                    <i data-lucide="mail"
                                        class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                                </div>
                                <p class="text-xs text-gray-400">Email cannot be changed.</p>
                            </div>

                            <div class="space-y-2">
                                <label class="text-sm font-medium text-gray-700 dark:text-gray-300">Phone Number</label>
                                <div class="relative">
                                    <input type="tel" id="input-phone" disabled placeholder="Add your phone number"
                                        class="w-full pl-10 pr-4 py-2.5 bg-gray-50 dark:bg-gray-900/50 border border-gray-200 dark:border-gray-700 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 disabled:opacity-60 disabled:cursor-not-allowed transition-all">
                                    <i data-lucide="phone"
                                        class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                                </div>
                            </div>

                            <div class="space-y-2 md:col-span-2">
                                <label class="text-sm font-medium text-gray-700 dark:text-gray-300">Address</label>
                                <div class="relative">
                                    <textarea id="input-address" disabled rows="2"
                                        placeholder="Add your delivery address"
                                        class="w-full pl-10 pr-4 py-2.5 bg-gray-50 dark:bg-gray-900/50 border border-gray-200 dark:border-gray-700 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 disabled:opacity-60 disabled:cursor-not-allowed transition-all resize-none"></textarea>
                                    <i data-lucide="map-pin" class="absolute left-3 top-3 w-4 h-4 text-gray-400"></i>
                                </div>
                            </div>

                            <div id="save-btn-container" class="md:col-span-2 flex justify-end hidden">
                                <button type="submit"
                                    class="px-6 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-xl shadow-lg shadow-blue-500/30 transition-all flex items-center gap-2">
                                    <i data-lucide="save" class="w-4 h-4"></i>
                                    Save Changes
                                </button>
                            </div>
                        </form>
                    </div>

                    <!-- Recent Access / History -->
                    <!-- Placeholder for history if needed in future -->
                </div>
            </main>
        </div>
    </div>

    <!-- Error & Debugging Display -->
    <div id="debug-error-banner"
        class="fixed top-0 left-0 w-full bg-red-600 text-white text-center p-2 hidden z-[100] font-bold">
        <span id="debug-error-msg"></span>
    </div>

    <!-- Firebase & Logic -->
    <script>
        window.onerror = function (msg, url, line) {
            const banner = document.getElementById('debug-error-banner');
            const span = document.getElementById('debug-error-msg');
            if (banner && span) {
                banner.classList.remove('hidden');
                span.innerText = "Script Error: " + msg + " (Line: " + line + ")";
            }
            console.error("Global Error:", msg, url, line);
            return false;
        };
    </script>
    <script src="js/main.js"></script>
    <script type="module">
        import { initAuthUI } from './js/auth-ui.js';
        import { auth, db, doc, getDoc, updateDoc, collection, query, where, getCountFromServer } from './firebase-config.js';

        console.log("Profile Module Script Started");
        initAuthUI();

        // Random Quotes & Dynamic Banner Logic
        const quotes = [
            { text: "The only way to do great work is to love what you do.", author: "Steve Jobs" },
            { text: "Logistics is the ball and chain of armored warfare.", author: "Heinz Guderian" },
            { text: "Amateurs talk strategy. Professionals talk logistics.", author: "Omar N. Bradley" },
            { text: "Innovation separates between a leader and a follower.", author: "Steve Jobs" },
            { text: "Quality is not an act, it is a habit.", author: "Aristotle" },
            { text: "Delivery is the moment of truth.", author: "Unknown" }
        ];

        function setRandomBanner() {
            const quoteEl = document.getElementById('banner-quote');
            const authorEl = document.getElementById('quote-author');
            const bgEl = document.getElementById('banner-bg');

            // Set Random Quote
            const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
            if (quoteEl) quoteEl.innerText = `"${randomQuote.text}"`;
            if (authorEl) {
                authorEl.innerText = `- ${randomQuote.author}`;
                authorEl.classList.remove('hidden');
            }

            // Set Random Nature/Tech Image
            // Using picsum with a random seed to ensure it changes but stays valid
            const seed = Math.floor(Math.random() * 1000);
            if (bgEl) bgEl.src = `https://picsum.photos/seed/${seed}/1200/400?grayscale&blur=1`;
        }
        setRandomBanner();

        // Auth Timeout Warning
        setTimeout(() => {
            const nameEl = document.getElementById('profile-name-large');
            if (nameEl && nameEl.innerText === "Loading...") {
                console.warn("Auth Timeout Reached");
                const banner = document.getElementById('debug-error-banner');
                if (banner) {
                    banner.classList.remove('hidden');
                    document.getElementById('debug-error-msg').innerText = "Data loading timed out. Check console or network.";
                }
            }
        }, 5000);


        let currentUser = null;
        let isEditing = false;

        // Populate Profile
        auth.onAuthStateChanged(async (user) => {
            console.log("Auth State Changed:", user ? user.uid : "No User");
            if (user) {
                currentUser = user;

                // 1. Basic Info from Auth
                console.log("Setting basic info from Auth...");
                document.getElementById('profile-email-large').innerText = user.email;
                document.getElementById('input-email').value = user.email;
                const displayName = user.displayName || "User";
                document.getElementById('profile-name-large').innerText = displayName;
                document.getElementById('input-name').value = displayName;

                // Variant: Avatar Logic
                const avatarUrl = user.photoURL || "https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/People/Man%20Technologist.png";
                document.getElementById('profile-img-large').src = avatarUrl;

                // Update sidebar avatar if it exists
                const sidebarImg = document.querySelector('.sidebar-user-img');
                if (sidebarImg) sidebarImg.src = avatarUrl;

                const sidebarName = document.querySelector('.sidebar-user-name');
                if (sidebarName) sidebarName.innerText = displayName;

                const userRef = doc(db, "users", user.uid);

                // 2. Fetch Extended Profile from Firestore
                try {
                    console.log("Fetching Firestore Doc:", user.uid);
                    const docSnap = await getDoc(userRef);
                    if (docSnap.exists()) {
                        console.log("Document data:", docSnap.data());
                        const data = docSnap.data();

                        // Only overwrite if data exists, otherwise keep Auth data
                        if (data.name) {
                            document.getElementById('profile-name-large').innerText = data.name;
                            document.getElementById('input-name').value = data.name;
                            const sbName = document.querySelector('.sidebar-user-name');
                            if (sbName) sbName.innerText = data.name;
                        }

                        document.getElementById('input-phone').value = data.phone || "";
                        document.getElementById('input-address').value = data.address || "";

                        // Joined Date Logic Improved
                        let joinedDate = null;
                        if (data.createdAt) {
                            if (data.createdAt.seconds) {
                                // Firestore Timestamp
                                joinedDate = new Date(data.createdAt.seconds * 1000);
                            } else if (typeof data.createdAt === 'string') {
                                // ISO String or similar
                                joinedDate = new Date(data.createdAt);
                            } else if (typeof data.createdAt === 'number') {
                                // Timestamp in ms
                                joinedDate = new Date(data.createdAt);
                            }

                            if (joinedDate && !isNaN(joinedDate.getTime())) {
                                document.getElementById('stat-joined-date').innerText = joinedDate.toLocaleDateString('en-US', {
                                    month: 'short', year: 'numeric'
                                });
                            } else {
                                document.getElementById('stat-joined-date').innerText = "N/A";
                            }
                        } else {
                            document.getElementById('stat-joined-date').innerText = "N/A";
                        }
                    } else {
                        console.log("No such document in Firestore!");
                        document.getElementById('stat-joined-date').innerText = "New Member";
                    }

                    // 3. Fetch Stats
                    // Total Orders
                    const qTotal = query(collection(db, "shipments"), where("userId", "==", user.uid));
                    const snapshotTotal = await getCountFromServer(qTotal);
                    console.log("Total Orders:", snapshotTotal.data().count);
                    document.getElementById('stat-total-orders').innerText = snapshotTotal.data().count;

                    // Active Orders
                    const qActive = query(collection(db, "shipments"), where("userId", "==", user.uid), where("status", "==", "In Transit"));
                    const snapshotActive = await getCountFromServer(qActive);
                    console.log("Active Orders:", snapshotActive.data().count);
                    document.getElementById('stat-active-orders').innerText = snapshotActive.data().count;

                } catch (error) {
                    console.error("Error fetching profile:", error);
                    alert("Error loading profile data: " + error.message);
                }
            } else {
                console.log("Redirecting to login...");
                window.location.href = 'login.html';
            }
        });

        // Toggle Edit Mode
        window.toggleEditMode = function () {
            isEditing = !isEditing;
            const inputs = ['input-name', 'input-phone', 'input-address'];
            const btnContainer = document.getElementById('save-btn-container');
            const editBtn = document.querySelector('button[onclick="toggleEditMode()"]');

            inputs.forEach(id => {
                document.getElementById(id).disabled = !isEditing;
            });

            if (isEditing) {
                btnContainer.classList.remove('hidden');
                editBtn.innerText = "Cancel";
                editBtn.classList.add('text-red-500');
                document.getElementById('input-name').focus();
            } else {
                btnContainer.classList.add('hidden');
                editBtn.innerText = "Edit Profile";
                editBtn.classList.remove('text-red-500');
                // Optional: Reset form values to saved state here if cancelled
            }
        };

        // Save Profile
        window.saveProfile = async function (e) {
            e.preventDefault();
            if (!currentUser) return;

            const newName = document.getElementById('input-name').value.trim();
            const newPhone = document.getElementById('input-phone').value.trim();
            const newAddress = document.getElementById('input-address').value.trim();

            const btn = document.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Saving...';

            try {
                // Update Firestore
                await updateDoc(doc(db, "users", currentUser.uid), {
                    name: newName,
                    phone: newPhone,
                    address: newAddress,
                    updatedAt: new Date()
                });

                // Update UI Feedback
                document.getElementById('profile-name-large').innerText = newName;
                document.querySelector('.sidebar-user-name').innerText = newName;

                const statusMsg = document.getElementById('form-status');
                statusMsg.classList.remove('hidden');
                setTimeout(() => statusMsg.classList.add('hidden'), 3000);

                // Exit Edit Mode
                toggleEditMode();

            } catch (error) {
                console.error("Error saving profile:", error);
                alert("Failed to save changes. Please try again.");
            } finally {
                btn.innerHTML = originalText;
                lucide.createIcons();
            }
        };

    </script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
