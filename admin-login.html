<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - TukTukTrack</title>
    <link href="./css/style.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>

<body
    class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 font-sans transition-colors duration-200 flex items-center justify-center h-screen">

    <!-- Background Blobs -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden z-0 pointer-events-none">
        <div
            class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-purple-500/20 rounded-full blur-[100px] animate-pulse">
        </div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-blue-500/20 rounded-full blur-[100px] animate-pulse"
            style="animation-delay: 2s;"></div>
    </div>

    <!-- Theme Toggle Button -->
    <button id="theme-toggle" style="position: fixed; top: 1.5rem; right: 1.5rem; z-index: 9999;"
        class="p-2 rounded-lg bg-gray-100 dark:bg-gray-800 text-gray-500 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-700 focus:outline-none focus:ring-4 focus:ring-gray-200 dark:focus:ring-gray-700 shadow-lg border border-gray-200 dark:border-gray-700 transition-all">
        <i data-lucide="moon" class="w-5 h-5 hidden dark:block"></i>
        <i data-lucide="sun" class="w-5 h-5 block dark:hidden"></i>
    </button>

    <div
        class="w-full max-w-md p-8 bg-white dark:bg-gray-800 rounded-2xl shadow-xl border border-gray-200 dark:border-gray-700 relative z-10">
        <div class="text-center mb-8">
            <div
                class="w-12 h-12 bg-gradient-to-tr from-purple-600 to-purple-400 rounded-xl flex items-center justify-center shadow-lg shadow-purple-500/20 mx-auto mb-4">
                <i data-lucide="shield-check" class="text-white w-6 h-6"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Admin Access</h1>
            <p class="text-sm text-gray-500 dark:text-gray-400">Secure login for administrators</p>
        </div>

        <form id="admin-login-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Email Address</label>
                <input type="email" id="email" required
                    class="w-full px-4 py-2 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-purple-500 outline-none transition-all"
                    placeholder="admin@tuktuk.com">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Password</label>
                <input type="password" id="password" required
                    class="w-full px-4 py-2 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-purple-500 outline-none transition-all"
                    placeholder="••••••••">
            </div>

            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <input id="remember-me" name="remember-me" type="checkbox"
                        class="h-4 w-4 text-purple-600 focus:ring-purple-500 border-gray-300 rounded cursor-pointer">
                    <label for="remember-me"
                        class="ml-2 block text-sm text-gray-700 dark:text-gray-300 select-none cursor-pointer">
                        Remember me
                    </label>
                </div>
                <a href="#" class="text-sm text-purple-600 dark:text-purple-400 hover:underline">Forgot Password?</a>
            </div>

            <button type="submit"
                class="w-full py-3 bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-700 hover:to-blue-700 text-white font-bold rounded-xl shadow-lg shadow-purple-500/30 transition-all transform hover:scale-[1.02]">
                Log In as Admin
            </button>
        </form>

        <p class="mt-6 text-center text-sm text-gray-500 dark:text-gray-400">
            Not an admin? <a href="login.html"
                class="text-purple-600 dark:text-purple-400 font-bold hover:underline">User Login</a>
        </p>
    </div>

    <script src="js/main.js"></script>
    <script type="module" src="js/admin-auth.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
