<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Sensor Status - TukTukTrack</title>
    <link href="./css/style.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>

<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 font-sans transition-colors duration-200">

    <div class="flex h-screen overflow-hidden relative">
        <!-- Sidebar Backdrop (Mobile) -->
        <div id="sidebar-backdrop"
            class="fixed inset-0 bg-black/50 z-[55] hidden md:hidden backdrop-blur-sm transition-opacity"></div>

        <!-- Sidebar -->
        <aside id="sidebar"
            class="md:w-72 bg-white md:bg-white/80 dark:bg-gray-900 md:dark:bg-gray-900/90 backdrop-blur-xl border-r border-gray-200 dark:border-gray-800 hidden md:flex flex-col z-50 transition-all duration-300">
            <div class="p-6 flex items-center justify-between gap-3 mb-2">
                <div class="flex items-center gap-3">
                    <div
                        class="w-10 h-10 bg-gradient-to-tr from-purple-600 to-purple-400 rounded-xl flex items-center justify-center shadow-lg shadow-purple-500/20">
                        <i data-lucide="truck" class="text-white w-6 h-6"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold tracking-tight text-gray-900 dark:text-white leading-none">TukTuk
                        </h1>
                        <span class="text-xs font-bold text-purple-500 tracking-widest uppercase">Driver</span>
                    </div>
                </div>
                <!-- Close Button (Mobile Only) -->
                <button id="sidebar-close"
                    class="md:hidden p-2 text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>

            <nav class="flex-1 px-4 space-y-2">
                <p class="px-4 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2 mt-4">Menu</p>

                <a href="driver-dashboard.html"
                    class="flex items-center gap-3 px-4 py-3.5 text-gray-600 dark:text-gray-400 hover:bg-white dark:hover:bg-gray-800 hover:shadow-md hover:shadow-gray-200/50 dark:hover:shadow-black/20 rounded-xl transition-all group">
                    <i data-lucide="layout-dashboard" class="w-5 h-5 group-hover:text-purple-500 transition-colors"></i>
                    <span class="font-medium group-hover:text-gray-900 dark:group-hover:text-white transition-colors">My
                        Assignments</span>
                </a>

                <a href="driver-sensor-status.html"
                    class="flex items-center gap-3 px-4 py-3.5 bg-gradient-to-r from-purple-600 to-purple-500 text-white rounded-xl shadow-lg shadow-purple-500/20 transition-all group">
                    <i data-lucide="activity" class="w-5 h-5"></i>
                    <span class="font-medium">Sensor Status</span>
                </a>

                <a href="contact-service-driver.html"
                    class="flex items-center gap-3 px-4 py-3.5 text-gray-600 dark:text-gray-400 hover:bg-white dark:hover:bg-gray-800 hover:shadow-md hover:shadow-gray-200/50 dark:hover:shadow-black/20 rounded-xl transition-all group">
                    <i data-lucide="life-buoy" class="w-5 h-5 group-hover:text-purple-500 transition-colors"></i>
                    <span
                        class="font-medium group-hover:text-gray-900 dark:group-hover:text-white transition-colors">Contact
                        Service</span>
                </a>
            </nav>

            <div class="p-4 border-t border-gray-200 dark:border-gray-800">
                <a href="profile.html"
                    class="flex items-center gap-3 p-3 rounded-xl bg-purple-50 dark:bg-purple-900/10 border border-purple-100 dark:border-purple-900/50 transition-colors group cursor-pointer hover:bg-purple-100 dark:hover:bg-purple-900/30">
                    <img src="https://ui-avatars.com/api/?name=Driver&background=9333ea&color=fff" alt="User"
                        class="w-10 h-10 rounded-xl shadow-sm sidebar-user-img">
                    <div class="overflow-hidden">
                        <p class="text-sm font-bold text-gray-900 dark:text-white truncate sidebar-user-name">Driver</p>
                        <p class="text-xs text-gray-500 dark:text-gray-400 truncate sidebar-user-role">Verified Driver
                        </p>
                    </div>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col overflow-hidden relative">
            <!-- Header -->
            <header
                class="h-16 md:h-20 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-800 flex items-center justify-between gap-4 px-4 md:px-8 z-40">
                <div class="flex items-center gap-4">
                    <button id="sidebar-toggle"
                        class="md:hidden p-2 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors">
                        <i data-lucide="menu" class="w-6 h-6"></i>
                    </button>
                    <div>
                        <h1 class="text-xl font-bold text-gray-900 dark:text-white md:hidden">Sensors</h1>
                        <h1 class="hidden md:block text-2xl font-bold text-gray-900 dark:text-white">Sensor Status</h1>
                        <p class="text-xs md:text-sm text-gray-500 dark:text-gray-400 hidden sm:block">Vehicle health
                            and sensor monitoring</p>
                    </div>
                </div>

                <div class="flex items-center gap-4">
                    <button id="theme-toggle"
                        class="p-2.5 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-xl transition-colors border border-transparent hover:border-gray-200 dark:hover:border-gray-700">
                        <i data-lucide="sun" class="w-5 h-5 dark:hidden"></i>
                        <i data-lucide="moon" class="w-5 h-5 hidden dark:block"></i>
                    </button>
                    <button id="logout-btn"
                        class="p-2.5 text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-xl transition-colors"
                        title="Logout">
                        <i data-lucide="log-out" class="w-5 h-5"></i>
                    </button>
                </div>
            </header>

            <!-- Content Scrollable Area -->
            <main class="flex-1 overflow-y-auto p-4 md:p-8">
                <div class="max-w-7xl mx-auto space-y-6">

                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div>
                            <h2 class="text-xl font-bold text-gray-900 dark:text-white">Assigned Vehicle Sensors</h2>
                            <p class="text-gray-500 dark:text-gray-400 text-sm">Monitor your current shipment's sensor
                                data</p>
                        </div>
                        <div class="flex items-center gap-3">
                            <div
                                class="flex items-center gap-2 px-3 py-1 bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400 rounded-full text-xs font-medium">
                                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                                Live Monitoring
                            </div>
                        </div>
                    </div>

                    <!-- Sensor Grid -->
                    <div id="sensor-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        <!-- Content will be injected by JS -->
                        <div class="col-span-full py-12 flex flex-col items-center justify-center text-gray-400">
                            <i data-lucide="loader-2" class="w-8 h-8 animate-spin mb-4 text-purple-500"></i>
                            <p>Loading driver view...</p>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script type="module" src="js/sensor-status.js"></script>
</body>

</html>
