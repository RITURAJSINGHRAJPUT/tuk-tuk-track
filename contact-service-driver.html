<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Support - TukTukTrack</title>
    <link href="./css/style.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>

<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 font-sans transition-colors duration-200">

    <div class="flex h-screen overflow-hidden relative">
        <!-- Sidebar Backdrop -->
        <div id="sidebar-backdrop"
            class="fixed inset-0 bg-black/50 z-[55] hidden md:hidden backdrop-blur-sm transition-opacity"></div>

        <!-- Driver Sidebar -->
        <aside id="sidebar"
            class="md:w-72 bg-white md:bg-white/80 dark:bg-gray-900 md:dark:bg-gray-900/90 backdrop-blur-xl border-r border-gray-200 dark:border-gray-800 hidden md:flex flex-col z-50 transition-all duration-300">
            <div class="p-6 flex items-center justify-between gap-3 mb-2">
                <div class="flex items-center gap-3">
                    <div
                        class="w-10 h-10 bg-gradient-to-tr from-purple-600 to-purple-400 rounded-xl flex items-center justify-center shadow-lg shadow-purple-500/20">
                        <i data-lucide="truck" class="text-white w-6 h-6"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold tracking-tight text-gray-900 dark:text-white leading-none">TukTuk
                        </h1>
                        <span class="text-xs font-bold text-purple-500 tracking-widest uppercase">Driver</span>
                    </div>
                </div>
                <button id="sidebar-close-btn"
                    class="md:hidden p-2 text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            <nav class="flex-1 px-4 space-y-2">
                <p class="px-4 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2 mt-4">Menu</p>
                <a href="driver-dashboard.html"
                    class="flex items-center gap-3 px-4 py-3.5 text-gray-600 dark:text-gray-400 hover:bg-white dark:hover:bg-gray-800 hover:shadow-md hover:shadow-gray-200/50 dark:hover:shadow-black/20 rounded-xl transition-all group">
                    <i data-lucide="layout-dashboard" class="w-5 h-5 group-hover:text-purple-500 transition-colors"></i>
                    <span class="font-medium group-hover:text-gray-900 dark:group-hover:text-white transition-colors">My
                        Assignments</span>
                </a>
                <a href="contact-service-driver.html"
                    class="flex items-center gap-3 px-4 py-3.5 bg-gradient-to-r from-purple-600 to-purple-500 text-white rounded-xl shadow-lg shadow-purple-500/20 transition-all group">
                    <i data-lucide="life-buoy" class="w-5 h-5"></i>
                    <span class="font-medium">Contact Service</span>
                </a>
            </nav>
            <div id="user-profile-section" class="p-4 border-t border-gray-200 dark:border-gray-800 mt-auto">
                <!-- Injected via JS -->
            </div>
        </aside>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col overflow-hidden relative">
            <header
                class="h-16 md:h-20 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-800 flex items-center justify-between px-4 md:px-8 z-40">
                <div class="flex items-center gap-4">
                    <button id="sidebar-toggle"
                        class="md:hidden p-2 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors">
                        <i data-lucide="menu" class="w-6 h-6"></i>
                    </button>
                    <div>
                        <h1 class="text-xl md:text-2xl font-bold text-gray-900 dark:text-white">Driver Support</h1>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <button id="theme-toggle"
                        class="p-2.5 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-xl transition-colors border border-transparent hover:border-gray-200 dark:hover:border-gray-700">
                        <i data-lucide="sun" class="w-5 h-5 dark:hidden"></i>
                        <i data-lucide="moon" class="w-5 h-5 hidden dark:block"></i>
                    </button>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-4 md:p-8">
                <div class="max-w-4xl mx-auto space-y-8">
                    <!-- Contacts Grid -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="contacts-grid">
                        <div
                            class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700">
                            <div
                                class="w-12 h-12 text-purple-600 bg-purple-100 dark:bg-purple-900/30 rounded-2xl flex items-center justify-center mb-4">
                                <i data-lucide="truck" class="w-6 h-6"></i>
                            </div>
                            <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-2">Fleet Manager</h3>
                            <div class="space-y-2">
                                <a href="tel:+15552223333"
                                    class="flex items-center gap-2 text-gray-600 dark:text-gray-400 hover:text-purple-600">
                                    <i data-lucide="phone" class="w-4 h-4"></i> +1 (555) 222-3333
                                </a>
                                <a href="mailto:fleet@tuktuk.com"
                                    class="flex items-center gap-2 text-gray-600 dark:text-gray-400 hover:text-purple-600">
                                    <i data-lucide="mail" class="w-4 h-4"></i> fleet@tuktuk.com
                                </a>
                            </div>
                        </div>
                        <div
                            class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700">
                            <div
                                class="w-12 h-12 text-red-600 bg-red-100 dark:bg-red-900/30 rounded-2xl flex items-center justify-center mb-4">
                                <i data-lucide="alert-triangle" class="w-6 h-6"></i>
                            </div>
                            <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-2">Emergency Dispatch</h3>
                            <div class="space-y-2">
                                <a href="tel:+15559110000"
                                    class="flex items-center gap-2 text-gray-600 dark:text-gray-400 hover:text-red-600">
                                    <i data-lucide="phone" class="w-4 h-4"></i> +1 (555) 911-0000
                                </a>
                                <a href="mailto:sos@tuktuk.com"
                                    class="flex items-center gap-2 text-gray-600 dark:text-gray-400 hover:text-red-600">
                                    <i data-lucide="mail" class="w-4 h-4"></i> sos@tuktuk.com
                                </a>
                            </div>
                        </div>
                    </div>

                    <!-- Message Form -->
                    <div
                        class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 p-6 md:p-8">
                        <h2 class="text-xl font-bold text-gray-900 dark:text-white mb-6 flex items-center gap-2">
                            <i data-lucide="message-square" class="w-5 h-5 text-purple-500"></i>
                            Raise an Issue
                        </h2>
                        <form id="contact-form" class="space-y-6">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label
                                        class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Subject</label>
                                    <select id="subject"
                                        class="bg-gray-50 dark:bg-gray-700/50 border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white text-sm rounded-xl focus:ring-purple-500 focus:border-purple-500 block w-full p-2.5">
                                        <option value="Vehicle Issue">Vehicle Issue</option>
                                        <option value="App Problem">App Problem</option>
                                        <option value="Accident Report">Accident Report</option>
                                        <option value="Payment Issue">Payment Issue</option>
                                    </select>
                                </div>
                                <div>
                                    <label
                                        class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Priority</label>
                                    <select id="priority"
                                        class="bg-gray-50 dark:bg-gray-700/50 border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white text-sm rounded-xl focus:ring-purple-500 focus:border-purple-500 block w-full p-2.5">
                                        <option value="Low">Low</option>
                                        <option value="Medium" selected>Medium</option>
                                        <option value="High">High</option>
                                    </select>
                                </div>
                            </div>
                            <div>
                                <label
                                    class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Message</label>
                                <textarea id="message" rows="4"
                                    class="bg-gray-50 dark:bg-gray-700/50 border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white text-sm rounded-xl focus:ring-purple-500 focus:border-purple-500 block w-full p-3"
                                    required></textarea>
                            </div>
                            <div class="flex justify-end">
                                <button type="submit"
                                    class="text-white bg-purple-600 hover:bg-purple-700 font-medium rounded-xl text-sm px-5 py-2.5 flex items-center gap-2 transition-all shadow-lg shadow-purple-500/30">
                                    <i data-lucide="send" class="w-4 h-4"></i> Send Message
                                </button>
                            </div>
                        </form>
                    </div>

                    <!-- Tickets History -->
                    <div id="tickets-section"
                        class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 p-6 md:p-8">
                        <h2 class="text-xl font-bold text-gray-900 dark:text-white flex items-center gap-2 mb-6">
                            <i data-lucide="history" class="w-5 h-5 text-purple-500"></i>
                            <span>My Tickets</span>
                        </h2>
                        <div id="tickets-list" class="space-y-4">
                            <p class="text-center text-gray-500 py-4">Loading tickets...</p>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast"
        class="fixed bottom-4 right-4 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 shadow-xl rounded-xl p-4 flex items-center gap-3 transform translate-y-24 transition-all duration-300 z-[100]">
        <div id="toast-icon" class="w-8 h-8 rounded-full bg-green-100 text-green-600 flex items-center justify-center">
            <i data-lucide="check" class="w-4 h-4"></i>
        </div>
        <div>
            <h4 id="toast-title" class="text-sm font-bold text-gray-900 dark:text-white">Success</h4>
            <p id="toast-message" class="text-xs text-gray-500 dark:text-gray-400">Action completed successfully.</p>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script type="module" src="js/contact-service-driver.js"></script>
</body>

</html>
