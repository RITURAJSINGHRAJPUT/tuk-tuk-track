    <script src="js/main.js"></script>
    <script type="module">
        import { initAdminGuard } from './js/admin-guard.js';
        import { adminDb as db, collection, query, where, getDocs, onSnapshot, doc, updateDoc, arrayUnion, Timestamp } from './firebase-config.js';

        initAdminGuard();
        lucide.createIcons();

        const shipmentSelect = document.getElementById('shipment-select');
        const latInput = document.getElementById('lat');
        const lngInput = document.getElementById('lng');
        const tempInput = document.getElementById('temp');

        // Load Shipments (Real-time)
        const q = query(collection(db, "shipments"));

        const unsubscribe = onSnapshot(q, (snapshot) => {
            shipmentSelect.innerHTML = '<option value="">Select a shipment...</option>';

            if (snapshot.empty) {
                shipmentSelect.innerHTML += '<option value="" disabled>No shipments found (Create one in Dashboard)</option>';
                return;
            }

            snapshot.forEach(doc => {
                const data = doc.data();
                const label = `${data.trackingId || doc.id} - ${data.userName || 'Unknown'} (${data.status})`;
                const option = document.createElement('option');
                option.value = doc.id;
                option.textContent = label;

                // Store current values if available
                if (data.currentLocation) {
                    option.dataset.lat = data.currentLocation.lat;
                    option.dataset.lng = data.currentLocation.lng;
                }
                if (data.currentTemperature) {
                    option.dataset.temp = data.currentTemperature;
                }
                shipmentSelect.appendChild(option);
            });
        }, (error) => {
            console.error("Error loading shipments:", error);
            alert("Error fetching shipments: " + error.message);
            shipmentSelect.innerHTML = '<option value="">Error loading data</option>';
        });

        // loadActiveShipments(); // Removed static fetch

        // On Select Change, pre-fill inputs
        shipmentSelect.addEventListener('change', (e) => {
            const selectedOption = e.target.options[e.target.selectedIndex];
            if (selectedOption.dataset.lat) latInput.value = selectedOption.dataset.lat;
            if (selectedOption.dataset.lng) lngInput.value = selectedOption.dataset.lng;
            if (selectedOption.dataset.temp) tempInput.value = selectedOption.dataset.temp;
        });

        // Update Data
        window.updateTrackingData = async () => {
            const shipmentId = shipmentSelect.value;
            const lat = parseFloat(latInput.value);
            const lng = parseFloat(lngInput.value);
            const temp = parseFloat(tempInput.value);

            if (!shipmentId) return alert("Please select a shipment.");
            if (isNaN(lat) || isNaN(lng) || isNaN(temp)) return alert("Please enter valid numbers.");

            const btn = document.querySelector('button[onclick="updateTrackingData()"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Updating...';
            btn.disabled = true;

            try {
                const shipmentRef = doc(db, "shipments", shipmentId);
                const timestamp = new Date().toISOString(); // Use string for standard JSON compatibility

                await updateDoc(shipmentRef, {
                    currentLocation: { lat, lng },
                    currentTemperature: temp,
                    // Append to history
                    locationHistory: arrayUnion({ lat, lng, timestamp }),
                    temperatureHistory: arrayUnion({ temp, timestamp })
                });

                alert("Shipment updated successfully!");

            } catch (error) {
                console.error("Error updating:", error);
                alert("Failed to update: " + error.message);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        };

        window.setPreset = (lat, lng) => {
            latInput.value = lat;
            lngInput.value = lng;
        };

        // loadActiveShipments(); // replaced by onSnapshot
    </script>
